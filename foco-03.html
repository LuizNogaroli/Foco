<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3: Geolocalização - Maquete SPU</title>
    
    <!-- Leaflet & Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <!-- Estilos Globais da Maquete -->
    <link rel="stylesheet" href="styles-forms.css">
    <link rel="stylesheet" href="hints.css">

    <style>
        #map {
            height: 500px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
            z-index: 1; /* Garante que hints/popups fiquem sobre o mapa */
        }
        
        .cep-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        
        #cep-info {
            margin-top: 5px;
            font-size: 0.85em;
            min-height: 1.2em;
        }
        .cep-info-ok { color: #28a745; font-weight: bold; }
        .cep-info-erro { color: #dc3545; font-weight: bold; }
        
        /* Ajuste do botão dentro da linha de CEP para combinar com o tema */
        .btn-search {
            padding: 10px 15px;
            height: 42px;
            white-space: nowrap;
        }

        .lista-geo {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        .lista-geo li {
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Geolocalização</h2>

        <form id="form03">
            
            <!-- Busca por CEP -->
            <div class="form-group editavel">
                <label for="cep">Localizar por CEP:</label>
                <div class="cep-row">
                    <input type="text" id="cep" name="cep" class="mask-cep" placeholder="00000-000" maxlength="9">
                    <button type="button" id="buscar-cep" class="btn-search">🔍 Buscar</button>
                </div>
                <div id="cep-info"></div>
            </div>

            <!-- Coordenadas Geográficas -->
            <div class="form-group editavel">
                <div class="cep-row">
                    <div style="flex: 1;">
                        <label for="latitude" style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Latitude:</label>
                        <input type="text" id="latitude" name="latitude" placeholder="-15.793889" style="width: 100%;">
                    </div>
                    <div style="flex: 1;">
                        <label for="longitude" style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Longitude:</label>
                        <input type="text" id="longitude" name="longitude" placeholder="-47.882778" style="width: 100%;">
                    </div>
                </div>
            </div>

            <!-- Mapa -->
            <div class="form-group" style="background: transparent; border: none; padding: 0;">
                <div id="map"></div>
                <div style="text-align: right; margin-top: -5px;">
                    <button type="button" id="expand-map" class="btn-secondary" style="padding: 5px 15px; font-size: 12px;">↔ Expandir Mapa</button>
                </div>
            </div>

            <!-- Elementos Desenhados -->
            <div class="form-group">
                <label>Documentos Geométricos (GeoJSON):</label>
                <ul id="lista-documentos" class="lista-geo">
                    <!-- Gerado dinamicamente -->
                </ul>
                <input type="hidden" name="geojson" id="geojson">
            </div>

            <!-- Observações Técnicas -->
            <div class="form-group editavel">
                <label for="observacoes">Observações Técnicas:</label>
                <textarea id="observacoes" name="observacoes" rows="3" placeholder="Detalhes sobre a poligonal, marcos, etc."></textarea>
            </div>

            <!-- Lista de anexos / documentos (Aba 3) -->
            <div class="form-group editavel" style="margin-top: 25px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <label style="font-weight: bold;">Documentos e Links Anexados (Aba 3 - Geolocalização):</label>
                <div class="dynamic-list-wrapper" style="flex: 1; display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                    <button type="button" class="btn-add" id="btnAdicionarDocumento03" style="align-self: flex-start;">＋ Adicionar link/documento</button>
                    <div id="documentos-list-03"></div>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="button-group">
                <button type="button" class="btn-secondary" onclick="location.reload()">Resetar Mapa</button>
                <button type="submit">✅ Salvar Geometria</button>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    
    <!-- Motor da Maquete -->
    <script src="formulario.js"></script>
    <script src="hints.js"></script>
    
    <script>
        // --- LÓGICA DO MAPA (IDÊNTICA À ORIGINAL, MAS COM VISUAL NOVO) ---
        var map = L.map('map').setView([-15.793889, -47.882778], 4); // Brasília como centro inicial
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            position: 'topright',
            draw: {
                polygon: true,
                polyline: true,
                marker: true,
                circle: false,
                rectangle: true
            },
            edit: { featureGroup: drawnItems }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.addLayer(e.layer);
            atualizarInterface();
        });

        map.on(L.Draw.Event.EDITED, atualizarInterface);
        map.on(L.Draw.Event.DELETED, atualizarInterface);

        function obterCentroDasGeometrias() {
            if (drawnItems.getLayers().length === 0) return null;
            
            // Se houver algum marcador desenhado, preferir a coordenada do marcador
            var markerLayer = null;
            drawnItems.eachLayer(function(layer) {
                if (layer instanceof L.Marker) {
                    markerLayer = layer;
                }
            });
            
            if (markerLayer) {
                return markerLayer.getLatLng();
            }
            
            // Caso contrário, pegar o centro dos limites de todas as geometrias desenhadas
            try {
                var bounds = drawnItems.getBounds();
                if (bounds.isValid()) {
                    return bounds.getCenter();
                }
            } catch (e) {
                console.error("Erro ao obter centro das geometrias:", e);
            }
            
            return null;
        }

        function atualizarInterface() {
            var geojson = drawnItems.toGeoJSON();
            document.getElementById('geojson').value = JSON.stringify(geojson);
            
            var lista = document.getElementById('lista-documentos');
            lista.innerHTML = '';
            
            drawnItems.eachLayer(function(layer) {
                var type = layer instanceof L.Polygon ? 'Polígono' : (layer instanceof L.Marker ? 'Ponto' : 'Linha');
                var li = document.createElement('li');
                li.innerHTML = `<span><b>${type}</b> (ID: ${layer._leaflet_id})</span>
                                <button type="button" class="btn-remove-rip" onclick="removerLayer(${layer._leaflet_id})">✕</button>`;
                lista.appendChild(li);
            });

            // Atualiza campos de Latitude e Longitude a partir das geometrias desenhadas
            var centro = obterCentroDasGeometrias();
            if (centro) {
                var latEl = document.getElementById('latitude');
                var lonEl = document.getElementById('longitude');
                if (latEl && lonEl) {
                    latEl.value = centro.lat.toFixed(6);
                    lonEl.value = centro.lng.toFixed(6);
                    latEl.dispatchEvent(new Event('change', { bubbles: true }));
                    lonEl.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }
        }

        window.removerLayer = function(id) {
            var layer = drawnItems.getLayer(id);
            if (layer) { drawnItems.removeLayer(layer); atualizarInterface(); }
        };

        // --- BUSCA DE CEP COM ZOOM ---
        document.getElementById('buscar-cep').addEventListener('click', function() {
            var cep = document.getElementById('cep').value.replace(/\D/g, '');
            var info = document.getElementById('cep-info');
            
            if (cep.length !== 8) {
                info.innerHTML = '<span class="cep-info-erro">CEP Inválido</span>';
                return;
            }

            info.innerHTML = '<span>Buscando...</span>';
            
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(r => r.json())
                .then(data => {
                    if (data.erro) {
                        info.innerHTML = '<span class="cep-info-erro">CEP não encontrado</span>';
                    } else {
                        var endereco = `${data.logradouro || ''}, ${data.localidade}, ${data.uf}, Brasil`;
                        
                        const buscarCoordenadas = (query) => {
                            return fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
                                .then(r => r.json());
                        };

                        buscarCoordenadas(endereco)
                            .then(geo => {
                                if (geo.length === 0) {
                                    // Fallback para cidade/estado se a rua não for encontrada
                                    return buscarCoordenadas(`${data.localidade}, ${data.uf}, Brasil`);
                                }
                                return geo;
                            })
                            .then(geo => {
                                if (geo && geo.length > 0) {
                                    const lat = parseFloat(geo[0].lat).toFixed(6);
                                    const lon = parseFloat(geo[0].lon).toFixed(6);
                                    
                                    map.setView([geo[0].lat, geo[0].lon], 16);
                                    
                                    // Limpar marcadores anteriores do CEP
                                    if (window.cepMarker) {
                                        map.removeLayer(window.cepMarker);
                                    }
                                    
                                    window.cepMarker = L.marker([geo[0].lat, geo[0].lon]).addTo(map);
                                    
                                    const popupContent = `
                                        <div style="font-family: sans-serif; font-size: 13px; line-height: 1.4;">
                                            <b style="color: #1e3a5f;">📍 Localização do CEP:</b><br>
                                            ${data.logradouro ? data.logradouro + '<br>' : ''}
                                            ${data.bairro ? data.bairro + ' - ' : ''}${data.localidade}/${data.uf}<br>
                                            <hr style="margin: 5px 0; border: 0; border-top: 1px solid #ddd;">
                                            <b>Lat:</b> ${lat}<br>
                                            <b>Lon:</b> ${lon}
                                        </div>
                                    `;
                                    window.cepMarker.bindPopup(popupContent).openPopup();
                                    
                                    info.innerHTML = `<span class="cep-info-ok">📍 ${data.localidade}/${data.uf} | Lat: ${lat}, Lon: ${lon}</span>`;

                                    // Preenche os campos de Latitude e Longitude da Aba 3
                                    var latEl = document.getElementById('latitude');
                                    var lonEl = document.getElementById('longitude');
                                    if (latEl && lonEl) {
                                        latEl.value = lat;
                                        lonEl.value = lon;
                                        latEl.dispatchEvent(new Event('change', { bubbles: true }));
                                        lonEl.dispatchEvent(new Event('change', { bubbles: true }));
                                    }
                                } else {
                                    info.innerHTML = `<span class="cep-info-ok">📍 ${data.localidade}/${data.uf} (Coordenadas não encontradas)</span>`;
                                }
                            })
                            .catch(err => {
                                console.error("Erro na geocodificação:", err);
                                info.innerHTML = `<span class="cep-info-erro">Erro ao obter coordenadas</span>`;
                            });
                    }
                })
                .catch(err => {
                    console.error("Erro ao buscar CEP:", err);
                    info.innerHTML = '<span class="cep-info-erro">Erro de conexão</span>';
                });
        });

        // Executa busca automática do CEP quando o campo é preenchido/alterado (ex: pelo sync.js)
        document.getElementById('cep').addEventListener('change', function() {
            var cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                setTimeout(() => {
                    document.getElementById('buscar-cep').click();
                }, 150);
            }
        });

        // Expansão do Mapa
        var expanded = false;
        document.getElementById('expand-map').addEventListener('click', function() {
            expanded = !expanded;
            document.getElementById('map').style.height = expanded ? '700px' : '500px';
            this.textContent = expanded ? '↔ Reduzir Mapa' : '↔ Expandir Mapa';
            setTimeout(() => map.invalidateSize(), 300);
        });

        // Trata o envio do formulário de geometria (evita recarregamento de página e salva explicitamente)
        document.getElementById('form03').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var geojson = drawnItems.toGeoJSON();
            var geojsonStr = JSON.stringify(geojson);
            document.getElementById('geojson').value = geojsonStr;
            
            if (window.parent && typeof window.parent.updateField === 'function') {
                window.parent.updateField('geojson', geojsonStr);
                window.parent.updateField('latitude', document.getElementById('latitude').value);
                window.parent.updateField('longitude', document.getElementById('longitude').value);
                window.parent.updateField('observacoes', document.getElementById('observacoes').value);
            }
            
            alert('✅ Geometria e coordenadas salvas com sucesso!\n📄 O resumo do processo foi atualizado e está disponível para visualização.');
        });

        // Inicializa a lista dinâmica de documentos customizados (Aba 3)
        window.inicializarListaDocumentosDinamica('aba3', 'btnAdicionarDocumento03', 'documentos-list-03');
    </script>
    <script src="sync.js"></script>
</body>
</html>
