<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOCO-03 — Análise e Proposta de Destinação</title>
  <link rel="stylesheet" href="styles-forms.css?v=1782355313469" />
  <link rel="stylesheet" href="hints.css?v=1782355313469" />
  <link rel="stylesheet" href="custom-select.css?v=1782355313469" />
  <style>
      .consolidated-box { background-color: #f1f5f9; border-left: 4px solid #0056b3; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
      .consolidated-box h4 { margin-top: 0; color: #1e3a5f; font-size: 1.1em; }
      .consolidated-box p { margin: 5px 0; font-size: 0.95em; color: #475569; }
      h4.section-title { margin: 24px 0 16px 0; color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 8px; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Análise e Proposta de Destinação</h2>
    <form id="form03" novalidate>
      
      <!-- Dados do Destinatário -->
      <h4 class="section-title">Análise do Destinatário</h4>
      <div class="form-group editavel">
          <label>CPF/CNPJ regular?</label>
          <div class="radio-group">
              <label class="radio-option"><input type="radio" name="cpf_cnpj_regular" value="Sim" required> Sim</label>
              <label class="radio-option"><input type="radio" name="cpf_cnpj_regular" value="Não"> Não</label>
              <label class="radio-option"><input type="radio" name="cpf_cnpj_regular" value="Não se aplica"> Não se aplica</label>
          </div>
      </div>
      <div class="form-group editavel">
          <label for="natureza_juridica">Natureza Jurídica do Destinatário:</label>
          <select id="natureza_juridica" name="natureza_juridica">
              <option value="">Selecione a Natureza Jurídica...</option>
              <option value="101-5">101-5 - Órgão Público do Poder Executivo Federal</option>
              <option value="206-2">206-2 - Sociedade Empresária Limitada</option>
              <option value="399-9">399-9 - Associação Privada</option>
          </select>
      </div>

      <!-- Pendências e Capacidade -->
      <h4 class="section-title">Pendências e Capacidade Financeira</h4>
      <div class="form-group editavel">
          <label>Pendências contratuais identificadas:</label>
          <div class="checkbox-group">
              <label class="checkbox-option"><input type="checkbox" name="pendencias[]" value="Nenhuma identificada" checked> Nenhuma identificada</label>
              <label class="checkbox-option"><input type="checkbox" name="pendencias[]" value="Inadimplência financeira"> Inadimplência financeira</label>
          </div>
      </div>
      <div class="form-group editavel">
          <label for="capacidade_fin">Capacidade orçamentária/financeira demonstrada:</label>
          <select id="capacidade_fin" name="capacidade_fin" required>
              <option value="">Selecione...</option>
              <option value="demonstrada">Demonstrada formalmente</option>
              <option value="não demonstrada">Não demonstrada</option>
              <option value="não se aplica">Não se aplica</option>
          </select>
      </div>

      <!-- Outros Fatores -->
      <h4 class="section-title">Ações, Custos e Interessados</h4>
      <div class="form-group editavel">
          <label for="acao_jud">Ações judiciais ou órgãos de controle associados:</label>
          <textarea id="acao_jud" name="acao_jud" placeholder="Descreva as principais informações..."></textarea>
      </div>
      <div class="form-group editavel">
          <label>Imóvel gera custos de manutenção para a SPU?</label>
          <div class="radio-group">
              <label class="radio-option"><input type="radio" name="custos_manutencao" value="Sim" onclick="document.getElementById('custos_valor').style.display='block'"> Sim</label>
              <label class="radio-option"><input type="radio" name="custos_manutencao" value="Não" checked onclick="document.getElementById('custos_valor').style.display='none'"> Não</label>
          </div>
          <input type="text" id="custos_valor" name="custos_valor" class="mask-moeda" placeholder="Valor Anual R$ 0,00" style="display:none; margin-top: 10px;">
      </div>
      <div class="form-group editavel">
          <label>Há outros interessados no imóvel?</label>
          <div class="radio-group">
              <label class="radio-option"><input type="radio" name="outros_interessados" value="Sim"> Sim</label>
              <label class="radio-option"><input type="radio" name="outros_interessados" value="Não" checked> Não</label>
          </div>
      </div>

      <!-- Proposta de Destinação -->
      <h4 class="section-title">Proposta de Destinação</h4>
      <div class="form-group editavel">
          <label for="tipo_procedimento">Tipo de procedimento pretendido:</label>
          <select id="tipo_procedimento" name="tipo_procedimento" required>
              <option value="" selected>Selecione...</option>
              <option value="Nova destinação">Nova destinação</option>
              <option value="Renovação">Renovação</option>
              <option value="Alteração">Alteração</option>
              <option value="Regularização">Regularização</option>
          </select>
      </div>

      <div class="form-group editavel">
          <label for="tipo_uso_imob">Tipo de uso imobiliário pretendido:</label>
          <select id="tipo_uso_imob" name="tipo_uso_imob" required>
              <option value="">Selecione...</option>
              <option value="0101">01.01 Uso administrativo e representativo</option>
              <option value="0106">01.06 Uso habitacional</option>
          </select>
      </div>

      <div class="form-group editavel">
          <label for="regime_destinacao">Regime de destinação proposto:</label>
          <select id="regime_destinacao" name="regime_destinacao" required>
              <option value="">Selecione...</option>
              <option value="02.01.01.01.02">Doação</option>
              <option value="02.02.02.01">Cessão de Uso Gratuita</option>
              <option value="02.02.02.02">Cessão de Uso Onerosa</option>
          </select>
      </div>
      
      <!-- Contrapartida -->
      <h4 class="section-title">Contrapartida e Impactos</h4>
      <div class="form-group editavel" id="secao-contrapartida">
          <label>Haverá contrapartida vinculada à destinação?</label>
          <div class="radio-group">
              <label class="radio-option"><input type="radio" name="tem_contrapartida" value="Sim" onclick="document.getElementById('bloco-contrapartida').style.display='flex'"> Sim</label>
              <label class="radio-option"><input type="radio" name="tem_contrapartida" value="Não" checked onclick="document.getElementById('bloco-contrapartida').style.display='none'"> Não</label>
          </div>
          <div id="bloco-contrapartida" style="display:none; margin-top: 10px; flex-direction: column; gap: 8px;">
              <label for="desc_contrapartida">Descrição da Contrapartida / Encargos:</label>
              <textarea id="desc_contrapartida" name="desc_contrapartida" placeholder="Descreva os encargos, obras ou melhorias assumidas pelo destinatário..."></textarea>
          </div>
      </div>

      <!-- Botões -->
                  <!-- Botões -->
            <div class="button-group" style="margin-top: 40px; display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #ccc; padding-top: 20px;">
                <button type="button" class="btn-secondary" id="btnLimpar" style="font-size: 1.1em; padding: 12px 24px; border-radius: 6px;">🗑️ Limpar</button>
                <button type="button" id="btnImprimir" style="font-size: 1.1em; padding: 12px 24px; border-radius: 6px; background-color: #0284c7; color: white; border: none; cursor: pointer;" onclick="window.print()">🖨️ Imprimir</button>
                <button type="submit" id="btnEnviar" class="btn-action" style="font-size: 1.1em; padding: 12px 24px; background-color: #28a745; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">💾 Salvar e Avançar ➡</button>
            </div>
</form>
  </div>

  <script src="formulario.js?v=1782355313469"></script>
  <script src="hints.js?v=1782355313469"></script>
  <script>
      document.getElementById('form03').addEventListener('submit', function(e) {
          e.preventDefault();
          const form = e.target;
          if (form.checkValidity()) {
              const rootWindow = window.parent?.parent || window.parent || window;
              if (rootWindow.saveToFinal) {
                  rootWindow.saveToFinal().then(res => {
                      if (res) {
                          alert('✅ Aba validada e salva na tabela definitiva com sucesso! Avançando para a próxima etapa...');
                          const btnTabNext = rootWindow.document?.querySelector('button[data-url="deliberacao-spu-uf.html"]');
                          if (btnTabNext) btnTabNext.click();
                      }
                  });
              } else {
                  alert('✅ Aba validada com sucesso! (Avançando em modo local...)');
                  const btnTabNext = rootWindow.document?.querySelector('button[data-url="deliberacao-spu-uf.html"]');
                  if (btnTabNext) btnTabNext.click();
              }
          } else {
              form.reportValidity();
          }
      });
  </script>
  <script src="sync.js?v=1782355313469"></script>
</body>
</html>
