<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5: Análise do Destinatário - Maquete SPU</title>
    
    <!-- Estilos Globais -->
    <link rel="stylesheet" href="styles-forms.css">
    <link rel="stylesheet" href="hints.css">
</head>
<body>
    <div class="form-container">
        <h2>Análise do Destinatário</h2>
        
        <form id="form05" novalidate>

            <!-- ── Regularidade Cadastral ────────────────────────────────── -->
            <div class="form-group editavel">
                <label>CPF regular?</label>
                <div class="radio-group" id="group-cpf-regular">
                    <label class="radio-option"><input type="radio" name="cpf_regular" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="cpf_regular" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="cpf_regular" value="Não se aplica"> Não se aplica</label>
                </div>
            </div>

            <div class="form-group editavel">
                <label>CNPJ regular?</label>
                <div class="radio-group" id="group-cnpj-regular">
                    <label class="radio-option"><input type="radio" name="cnpj_regular" value="Sim"> Sim</label>
                    <label class="radio-option"><input type="radio" name="cnpj_regular" value="Não"> Não</label>
                    <label class="radio-option"><input type="radio" name="cnpj_regular" value="Não se aplica"> Não se aplica</label>
                </div>
            </div>

            <!-- ── Natureza Jurídica (Transferido da Etapa 01) ──────────────── -->
            <div id="bloco-natureza-juridica" style="display: none;">
                <div class="form-group editavel">
                    <label for="campo16">Natureza Jurídica:</label>
                    <select id="campo16" name="campo16">
                        <option value="">Selecione a Natureza Jurídica...</option>
                    
                    <optgroup label="1. Administração Pública">
                        <option value="101-5">101-5 - Órgão Público do Poder Executivo Federal</option>
                        <option value="102-3">102-3 - Órgão Público do Poder Executivo Estadual ou do Distrito Federal</option>
                        <option value="103-1">103-1 - Órgão Público do Poder Executivo Municipal</option>
                        <option value="104-0">104-0 - Órgão Público do Poder Legislativo Federal</option>
                        <option value="105-8">105-8 - Órgão Público do Poder Legislativo Estadual ou do Distrito Federal</option>
                        <option value="106-6">106-6 - Órgão Público do Poder Legislativo Municipal</option>
                        <option value="107-4">107-4 - Órgão Público do Poder Judiciário Federal</option>
                        <option value="108-2">108-2 - Órgão Público do Poder Judiciário Estadual</option>
                        <option value="110-4">110-4 - Autarquia Federal</option>
                        <option value="111-2">111-2 - Autarquia Estadual ou do Distrito Federal</option>
                        <option value="112-0">112-0 - Autarquia Municipal</option>
                        <option value="113-9">113-9 - Fundação Pública de Direito Público Federal</option>
                        <option value="114-7">114-7 - Fundação Pública de Direito Público Estadual ou do Distrito Federal</option>
                        <option value="115-5">115-5 - Fundação Pública de Direito Público Municipal</option>
                        <option value="116-3">116-3 - Órgão Público Autônomo Federal</option>
                        <option value="117-1">117-1 - Órgão Público Autônomo Estadual ou do Distrito Federal</option>
                        <option value="118-0">118-0 - Órgão Público Autônomo Municipal</option>
                        <option value="119-8">119-8 - Comissão Polinacional</option>
                        <option value="121-0">121-0 - Consórcio Público de Direito Público (Associação Pública)</option>
                        <option value="122-8">122-8 - Consórcio Público de Direito Privado</option>
                        <option value="123-6">123-6 - Estado ou Distrito Federal</option>
                        <option value="124-4">124-4 - Município</option>
                        <option value="125-2">125-2 - Fundação Pública de Direito Privado Federal</option>
                        <option value="126-0">126-0 - Fundação Pública de Direito Privado Estadual ou do Distrito Federal</option>
                        <option value="127-9">127-9 - Fundação Pública de Direito Privado Municipal</option>
                        <option value="128-7">128-7 - Fundo Público da Administração Indireta Federal</option>
                        <option value="129-5">129-5 - Fundo Público da Administração Indireta Estadual ou do Distrito Federal</option>
                        <option value="130-9">130-9 - Fundo Público da Administração Indireta Municipal</option>
                        <option value="131-7">131-7 - Fundo Público da Administração Direta Federal</option>
                        <option value="132-5">132-5 - Fundo Público da Administração Direta Estadual ou do Distrito Federal</option>
                        <option value="133-3">133-3 - Fundo Público da Administração Direta Municipal</option>
                        <option value="134-1">134-1 - União</option>
                    </optgroup>

                    <optgroup label="2. Entidades Empresariais">
                        <option value="201-1">201-1 - Empresa Pública</option>
                        <option value="203-8">203-8 - Sociedade de Economia Mista</option>
                        <option value="204-6">204-6 - Sociedade Anônima Aberta</option>
                        <option value="205-4">205-4 - Sociedade Anônima Fechada</option>
                        <option value="206-2" selected>206-2 - Sociedade Empresária Limitada</option>
                        <option value="207-0">207-0 - Sociedade Empresária em Nome Coletivo</option>
                        <option value="208-9">208-9 - Sociedade Empresária em Comandita Simples</option>
                        <option value="209-7">209-7 - Sociedade Empresária em Comandita por Ações</option>
                        <option value="212-7">212-7 - Sociedade em Conta de Participação</option>
                        <option value="213-5">213-5 - Empresário (Individual)</option>
                        <option value="214-3">214-3 - Cooperativa</option>
                        <option value="215-1">215-1 - Consórcio de Sociedades</option>
                        <option value="216-0">216-0 - Grupo de Sociedades</option>
                        <option value="217-8">217-8 - Estabelecimento, no Brasil, de Sociedade Estrangeira</option>
                        <option value="219-4">219-4 - Estabelecimento, no Brasil, de Empresa Binacional Argentino-Brasileira</option>
                        <option value="221-6">221-6 - Empresa Domiciliada no Exterior</option>
                        <option value="222-4">222-4 - Clube/Fundo de Investimento</option>
                        <option value="223-2">223-2 - Sociedade Simples Pura</option>
                        <option value="224-0">224-0 - Sociedade Simples Limitada</option>
                        <option value="225-9">225-9 - Sociedade Simples em Nome Coletivo</option>
                        <option value="226-7">226-7 - Sociedade Simples em Comandita Simples</option>
                        <option value="227-5">227-5 - Empresa Binacional</option>
                        <option value="228-3">228-3 - Consórcio de Empregadores</option>
                        <option value="229-1">229-1 - Consórcio Simples</option>
                        <option value="230-5">230-5 - Empresa Individual de Responsabilidade Limitada (de Natureza Empresária)</option>
                        <option value="231-3">231-3 - Empresa Individual de Responsabilidade Limitada (de Natureza Simples)</option>
                        <option value="232-1">232-1 – Sociedade Unipessoal de Advogados</option>
                        <option value="233-0">233-0 – Cooperativas de Consumo</option>
                        <option value="234-8">234-8 – Empresa Simples de Inovação - Inova Simples</option>
                        <option value="235-6">235-6 – Investidor Não Residente</option>
                    </optgroup>

                    <optgroup label="3. Entidades sem Fins Lucrativos">
                        <option value="303-4">303-4 - Serviço Notarial e Registral (Cartório)</option>
                        <option value="306-9">306-9 - Fundação Privada</option>
                        <option value="307-7">307-7 - Serviço Social Autônomo</option>
                        <option value="308-5">308-5 - Condomínio Edilício</option>
                        <option value="310-7">310-7 - Comissão de Conciliação Prévia</option>
                        <option value="311-5">311-5 - Entidade de Mediação e Arbitragem</option>
                        <option value="313-1">313-1 - Entidade Sindical</option>
                        <option value="320-4">320-4 - Estabelecimento, no Brasil, de Fundação ou Associação Estrangeiras</option>
                        <option value="321-2">321-2 - Fundação ou Associação Domiciliada no Exterior</option>
                        <option value="322-0">322-0 - Organização Religiosa</option>
                        <option value="323-9">323-9 - Comunidade Indígena</option>
                        <option value="324-7">324-7 - Fundo Privado</option>
                        <option value="325-5">325-5 - Órgão de Direção Nacional de Partido Político</option>
                        <option value="326-3">326-3 - Órgão de Direção Regional de Partido Político</option>
                        <option value="327-1">327-1 - Órgão de Direção Local de Partido Político</option>
                        <option value="328-0">328-0 - Comitê Financeiro de Partido Político</option>
                        <option value="329-8">329-8 - Frente Plebiscitária ou Referendária</option>
                        <option value="330-1">330-1 - Organização Social (OS)</option>
                        <option value="331-0">331-0 - Demais Condomínios</option>
                        <option value="332-8">332-8 - Plano de Benefícios de Previdência Complementar Fechada</option>
                        <option value="399-9">399-9 - Associação Privada</option>
                    </optgroup>

                    <optgroup label="4. Pessoas Físicas">
                        <option value="401-4">401-4 - Empresa Individual Imobiliária</option>
                        <option value="402-2">402-2 - Segurado Especial</option>
                        <option value="408-1">408-1 - Contribuinte individual</option>
                        <option value="409-0">409-0 - Candidato a Cargo Político Eletivo</option>
                        <option value="411-1">411-1 - Leiloeiro</option>
                        <option value="412-0">412-0 - Produtor Rural (Pessoa Física)</option>
                    </optgroup>

                    <optgroup label="5. Organizações Internacionais">
                        <option value="501-0">501-0 - Organização Internacional</option>
                        <option value="502-9">502-9 - Representação Diplomática Estrangeira</option>
                        <option value="503-7">503-7 - Outras Instituições Extraterritoriais</option>
                    </optgroup>
                </select>
            </div></div>

            <!-- ── 3.1 Destinação ativa ─────────────────────────────────────── -->
            <div class="form-group editavel">
                <label>
                    Requerente/interessado possui destinação ativa?
                    <span class="hint-semaforo">
                        <span
                            class="hint-icon hint-link"
                            data-hint-tipo="verde"
                            data-popup="hints/destinacao_ativa.html"
                            data-hint="Clique para abrir informações detalhadas sobre destinação ativa."
                            role="button"
                            tabindex="0"
                            aria-label="Ajuda: Destinação ativa"
                        >?</span>
                    </span>
                </label>

                <div class="radio-group" id="group-campo31">
                    <label class="radio-option">
                        <input type="radio" name="campo31" value="Sim"> Sim
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="campo31" value="Não" checked> Não
                    </label>
                </div>

                <!-- 3.1 → Subgrupo: contratos (exibido apenas quando "Sim") -->
                <div id="bloco31" style="display: none; flex-direction: column; gap: 6px; margin-top: 15px;">
                    <label for="campo31_contratos">Contratos/Instrumentos relacionados à destinação ativa:</label>
                    <textarea
                        id="campo31_contratos"
                        name="campo31_contratos"
                        placeholder="Ex: Contrato de Cessão de Uso nº 001/2020, vigência até 12/2025..."
                    ></textarea>
                </div>
            </div>

            <!-- ── 3.2 Pendências identificadas ────────────────────────────── -->
            <div class="form-group editavel">
                <label>Pendências contratuais identificadas (Ativas ou não):</label>

                <div class="checkbox-group" id="group-campo42" style="display: flex; flex-direction: column; gap: 10px;">
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Nenhuma identificada" id="campo42-nenhuma" checked>
                        Nenhuma identificada
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Inadimplência financeira">
                        Inadimplência financeira
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Pendências contratuais">
                        Pendências contratuais
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Irregularidade cadastral">
                        Irregularidade cadastral
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Uso em desacordo com o autorizado">
                        Uso em desacordo com o autorizado
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="campo42[]" value="Outras" id="campo42-outras">
                        Outras
                    </label>
                </div>

                <div id="bloco-pendencias-obs" style="display: none; margin-top: 15px;">
                    <label for="campo32_obs">Observações sobre pendências:</label>
                    <textarea
                        id="campo32_obs"
                        name="campo32_obs"
                        placeholder="Descreva as pendências identificadas..."
                    ></textarea>
                </div>
            </div>

            <!-- ── 3.3 Capacidade técnica demonstrada ──────────────────────── -->
            <div class="form-group editavel">
                <label for="campo33">Capacidade técnica demonstrada:</label>

                <select id="campo33" name="campo33" required>
                    <option value="">Selecione...</option>
                    <option value="Demonstrada formalmente">Demonstrada formalmente (Documentação analisada)</option>
                    <option value="Demonstrada informalmente">Demonstrada informalmente (Evidências indiretas)</option>
                    <option value="Não demonstrada">Não demonstrada (Documentação insuficiente)</option>
                    <option value="Não se aplica">Não se aplica</option>
                </select>

                <div id="bloco33_obs" style="display: none; margin-top: 15px;">
                    <label for="campo33_obs">Observações sobre a capacidade técnica:</label>
                    <textarea
                        id="campo33_obs"
                        name="campo33_obs"
                        placeholder="Observações complementares..."
                    ></textarea>
                </div>
            </div>

            <!-- ── Observações Gerais ─────────────────────────────────────── -->
               
                <div class="dynamic-list-wrapper" style="margin-top: 10px;">
                    <button type="button" class="btn-add" id="btnAdicionarDocumento05">
                        ＋ Adicionar link/documento
                    </button>
                    <div id="documentos-list-05"></div>
                </div>
            </div>

            <!-- ── Botões ───────────────────────────────────────────────────── -->
            <div class="button-group">
                <button type="button" class="btn-secondary" id="btnLimpar">🗑️ Limpar</button>
                <button type="button" id="btnImprimir" onclick="window.print()">🖨️ Imprimir</button>
                <button type="submit" id="btnEnviar">✅ Salvar rascunho</button>
            </div>


        </form>
    </div>

    <!-- Scripts do Motor -->
    <script src="formulario.js"></script>
    <script src="hints.js"></script>
    <script src="foco-05.js"></script>
</body>
</html>
